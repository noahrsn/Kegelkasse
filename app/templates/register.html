{% extends "base.html" %}

{% block title %}Registrieren — Kegelkasse{% endblock %}

{% block body %}
<div class="split-layout">

    <!-- LEFT — brand panel -->
    <div class="split-layout__image">
        <div style="position:absolute;top:-80px;right:-80px;width:280px;height:280px;border-radius:50%;background:rgba(59,45,130,0.12);pointer-events:none;"></div>
        <div style="position:absolute;bottom:-60px;left:-60px;width:220px;height:220px;border-radius:50%;background:rgba(59,45,130,0.1);pointer-events:none;"></div>
        <div style="position:relative;z-index:1;text-align:center;padding:2.5rem;">
            <div style="font-size:4rem;margin-bottom:1rem;">🎳</div>
            <div style="font-family:'Nunito',sans-serif;font-size:2.2rem;font-weight:900;color:#1A1028;line-height:1;margin-bottom:0.5rem;">Kegelkasse</div>
            <div style="font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:700;color:#5A4E78;">Dein Kegelclub. Digital.</div>
        </div>
    </div>

    <!-- RIGHT — form -->
    <div class="split-layout__form">
        <div style="width:100%;max-width:380px;">

            <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:1.8rem;color:var(--text1);margin-bottom:0.25rem;">Konto erstellen</div>
            <div style="font-size:0.875rem;font-weight:700;color:var(--text2);margin-bottom:2rem;font-family:'Nunito',sans-serif;">Kostenlos registrieren und deinen Club verwalten.</div>

            {% if error %}
            <div class="alert alert--danger">{{ error }}</div>
            {% endif %}

            <form method="post" action="/register" hx-boost="false" style="display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem;">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                    <div>
                        <label for="first_name">Vorname</label>
                        <input class="input" type="text" id="first_name" name="first_name" placeholder="Max" required autocomplete="given-name">
                    </div>
                    <div>
                        <label for="last_name">Nachname</label>
                        <input class="input" type="text" id="last_name" name="last_name" placeholder="Mustermann" required autocomplete="family-name">
                    </div>
                </div>
                <div>
                    <label for="email">E-Mail</label>
                    <input class="input" type="email" id="email" name="email" placeholder="deine@email.de" required autocomplete="email">
                </div>
                <div>
                    <label for="password">Passwort</label>
                    <input class="input" type="password" id="password" name="password" placeholder="Mindestens 8 Zeichen" required autocomplete="new-password" minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;min-height:48px;">Konto erstellen</button>
            </form>

            <p style="text-align:center;font-size:0.8rem;font-weight:700;color:var(--text2);font-family:'Nunito',sans-serif;">
                Bereits registriert?
                <a href="/login" style="color:var(--purple);text-decoration:none;font-weight:800;">Anmelden</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
