{% extends "base.html" %}

{% block title %}Regelwerk bearbeiten — {{ group_name }} — Kegelkasse{% endblock %}

{% block content %}
<div class="hero" style="background: linear-gradient(135deg, #0D0D0F 0%, #0d1a12 60%, #0D0D0F 100%);">
    <div class="hero__overlay"></div>
    <div class="hero__content">
        <h1 style="font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; margin: 0 0 0.125rem;">Regelwerk bearbeiten</h1>
        <p style="color: var(--color-text-secondary); font-size: 0.75rem; margin: 0;">{{ group_name }}</p>
    </div>
</div>

<div style="padding: 1.5rem; max-width: 800px;">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem;">
        <a href="/group/{{ group_id }}/rulebook" class="text-secondary" style="font-size: 0.875rem; text-decoration: none;">← Zurück</a>
        <span class="text-secondary" style="font-size: 0.75rem;">Markdown wird unterstützt</span>
    </div>

    <form method="post" action="/group/{{ group_id }}/rulebook/edit">
        <div style="margin-bottom: 1rem;">
            <textarea
                class="input"
                name="content"
                rows="28"
                placeholder="# Vereinsregelwerk&#10;&#10;## §1 Name und Sitz&#10;&#10;..."
                style="font-family: 'JetBrains Mono', monospace; font-size: 0.8125rem; line-height: 1.6; resize: vertical;"
            >{{ content_md }}</textarea>
        </div>
        <div style="display: flex; gap: 0.75rem;">
            <button type="submit" class="btn btn-primary">Speichern</button>
            <a href="/group/{{ group_id }}/rulebook" class="btn btn-secondary">Abbrechen</a>
        </div>
    </form>
</div>
{% endblock %}
