{% extends "base.html" %}

{% block title %}Regelwerk bearbeiten — {{ group_name }} — Kegelkasse{% endblock %}

{% block content %}

<!-- Header island -->
<div style="background:var(--card-cream);border-radius:0 0 var(--radius-lg) var(--radius-lg);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow);">
    <a href="/group/{{ group_id }}/rulebook" style="font-size:0.78rem;font-weight:800;color:var(--text2);text-decoration:none;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:0.25rem;margin-bottom:0.75rem;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        Regelwerk
    </a>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;">
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:1.2rem;color:var(--text1);">Regelwerk bearbeiten</div>
        <span style="font-size:0.72rem;font-weight:700;color:var(--text3);font-family:'Nunito',sans-serif;">Markdown wird unterstützt</span>
    </div>
    <div style="font-size:0.68rem;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;font-family:'Nunito',sans-serif;margin-top:4px;">{{ group_name }}</div>
</div>

<div style="padding:0 1.25rem 1.5rem;max-width:800px;padding-bottom:96px;">
    <form method="post" action="/group/{{ group_id }}/rulebook/edit">
        <div style="margin-bottom:1rem;">
            <textarea
                class="input"
                name="content"
                rows="28"
                placeholder="# Vereinsregelwerk&#10;&#10;## §1 Name und Sitz&#10;&#10;..."
                style="font-family:'Nunito',sans-serif;font-size:0.8125rem;line-height:1.6;resize:vertical;"
            >{{ content_md }}</textarea>
        </div>
        <div style="display:flex;gap:0.75rem;">
            <button type="submit" class="btn btn-primary">Speichern</button>
            <a href="/group/{{ group_id }}/rulebook" class="btn btn-secondary">Abbrechen</a>
        </div>
    </form>
</div>
{% endblock %}
