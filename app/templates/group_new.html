{% extends "base.html" %}

{% block title %}Neuen Club erstellen — Kegelkasse{% endblock %}

{% block body %}
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:var(--bg);">
    <div style="width:100%;max-width:440px;">
        <div style="text-align:center;margin-bottom:2rem;">
            <div style="font-size:2.5rem;margin-bottom:0.75rem;">🎳</div>
            <div style="font-family:'Nunito',sans-serif;font-size:1.5rem;font-weight:900;color:var(--text1);margin-bottom:0.25rem;">Neuen Club erstellen</div>
            <p style="font-size:0.875rem;font-weight:700;color:var(--text2);font-family:'Nunito',sans-serif;margin:0;">Du wirst automatisch zum Admin ernannt.</p>
        </div>

        {% if error %}
        <div class="alert alert--danger" style="margin-bottom:1.5rem;">{{ error }}</div>
        {% endif %}

        <form method="post" action="/groups/new" style="display:flex;flex-direction:column;gap:1.25rem;">
            <div>
                <label>Clubname</label>
                <input class="input" type="text" name="name" placeholder="z.B. Kegelclub Adler 1984" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Club erstellen & Einrichtung starten</button>
        </form>

        <p style="text-align:center;margin-top:1.5rem;font-size:0.875rem;font-family:'Nunito',sans-serif;">
            <a href="/dashboard" style="color:var(--purple);text-decoration:none;font-weight:800;">← Zurück</a>
        </p>
    </div>
</div>
{% endblock %}
