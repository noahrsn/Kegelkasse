{% extends "base.html" %}

{% block title %}Neues Passwort — Kegelkasse{% endblock %}

{% block body %}
<div class="split-layout">
    <div class="split-layout__image" style="background: linear-gradient(135deg, #0D0D0F 0%, #1a120a 50%, #0D0D0F 100%);">
        <div class="split-layout__image-overlay">
            <div style="text-align: center; padding: 2rem;">
                <div style="font-size: 4rem; margin-bottom: 1rem;">🎳</div>
                <h1 style="font-family: 'Space Grotesk', sans-serif; font-size: 2rem; color: var(--amber); margin: 0 0 0.5rem;">Kegelkasse</h1>
                <p style="color: var(--text2); margin: 0;">Dein Kegelclub. Digital.</p>
            </div>
        </div>
    </div>

    <div class="split-layout__form">
        <div style="width: 100%; max-width: 400px;">
            <h2 style="font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; margin-bottom: 0.25rem;">Neues Passwort</h2>
            <p class="text-secondary" style="margin-bottom: 2rem; font-size: 0.875rem;">Wähle ein neues Passwort für dein Konto.</p>

            {% if error %}
            <div class="badge badge--danger" style="display: block; padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.875rem;">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/reset-password" style="display: flex; flex-direction: column; gap: 1.25rem;">
                <input type="hidden" name="token" value="{{ token }}">
                <div>
                    <label for="password">Neues Passwort</label>
                    <input class="input" type="password" id="password" name="password" placeholder="Mindestens 8 Zeichen" required autocomplete="new-password" minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Passwort speichern</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
