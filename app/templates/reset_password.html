{% extends "base.html" %}

{% block title %}Neues Passwort — Kegelkasse{% endblock %}

{% block body %}
<div class="split-layout">
    <div class="split-layout__image">
        <div style="position:absolute;top:-80px;right:-80px;width:280px;height:280px;border-radius:50%;background:rgba(59,45,130,0.12);pointer-events:none;"></div>
        <div style="position:relative;z-index:1;text-align:center;padding:2.5rem;">
            <div style="font-size:4rem;margin-bottom:1rem;">🎳</div>
            <div style="font-family:'Nunito',sans-serif;font-size:2.2rem;font-weight:900;color:#1A1028;line-height:1;margin-bottom:0.5rem;">Kegelkasse</div>
            <div style="font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:700;color:#5A4E78;">Dein Kegelclub. Digital.</div>
        </div>
    </div>

    <div class="split-layout__form">
        <div style="width:100%;max-width:400px;">
            <div style="font-family:'Nunito',sans-serif;font-size:1.5rem;font-weight:900;color:var(--text1);margin-bottom:0.25rem;">Neues Passwort</div>
            <p style="font-size:0.875rem;font-weight:700;color:var(--text2);font-family:'Nunito',sans-serif;margin-bottom:2rem;">Wähle ein neues Passwort für dein Konto.</p>

            {% if error %}
            <div class="alert alert--danger" style="margin-bottom:1.5rem;">{{ error }}</div>
            {% endif %}

            <form method="post" action="/reset-password" style="display:flex;flex-direction:column;gap:1.25rem;">
                <input type="hidden" name="token" value="{{ token }}">
                <div>
                    <label>Neues Passwort</label>
                    <input class="input" type="password" name="password" placeholder="Mindestens 8 Zeichen" required autocomplete="new-password" minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Passwort speichern</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
