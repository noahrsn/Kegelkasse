# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - penalty-webapp

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Hinweis:
# Dieser Workflow deployt "Code" (Zip/Oryx) auf Azure App Service.
# Falls du alternativ einen Container-Deploy verwendest (Docker/ACR), sollten nicht
# beide Varianten gleichzeitig auf denselben App Service deployen.

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          source antenv/bin/activate
          ruff check app/ tests/

      - name: Test (pytest)
        env:
          ENVIRONMENT: development
          JWT_SECRET: test-secret-for-ci
          COSMOS_ENDPOINT: ""
          COSMOS_KEY: ""
        run: |
          source antenv/bin/activate
          pytest tests/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

      # 🚫 Opting Out of Oryx Build
      # If you prefer to disable the Oryx build process during deployment, follow these steps:
      # 1. Remove the SCM_DO_BUILD_DURING_DEPLOYMENT app setting from your Azure App Service Environment variables.
      # 2. Refer to sample workflows for alternative deployment strategies: https://github.com/Azure/actions-workflow-samples/tree/master/AppService
      

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_06C8C531F33040B8B50DB5340B26A361 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8F6747E0BD8044A5A74970FF4E78DAA2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C0262DA0A6E641079E39F4B79FA584F2 }}

      # Azure App Service (Linux) braucht für FastAPI/ASGI einen expliziten Startup Command.
      # Ohne den startet die App häufig nicht korrekt -> "Application Error".
      - name: Configure startup command (FastAPI)
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail

            APP_NAME='penalty-webapp'
            # Parameter expansion soll erst zur Laufzeit in Azure passieren.
            STARTUP_CMD='gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:${PORT:-8000} --access-logfile - --error-logfile -'

            RG=$(az webapp list --query "[?name=='${APP_NAME}'].resourceGroup" -o tsv)
            if [ -z "$RG" ]; then
              echo "Resource group for webapp '$APP_NAME' not found in subscription." >&2
              exit 1
            fi

            echo "Setting startup command for $APP_NAME in resource group $RG"
            az webapp config set --name "$APP_NAME" --resource-group "$RG" --startup-file "$STARTUP_CMD"

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'penalty-webapp'
          slot-name: 'Production'
          package: .